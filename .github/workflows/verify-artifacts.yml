name: verify-artifacts

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python sources
        run: python -m py_compile $(git ls-files '*.py')

      - name: Verify frozen final artifacts
        run: |
          python tools/verify_final_manifest.py \
            --manifest outputs/final_plots/ARTIFACT_MANIFEST.csv \
            --strict 1

      - name: Verify curated analysis artifacts
        run: |
          python tools/verify_analysis_manifest.py \
            --manifest outputs/analysis/ARTIFACT_MANIFEST.csv \
            --strict 1
